<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOXL-Music Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
</head>
<body>
    <div class="background-stage" id="backgroundStage" aria-hidden="true">
        <div class="background-stage__layer background-stage__layer--base" id="backgroundBaseLayer"></div>
        <div class="background-stage__layer background-stage__layer--transition" id="backgroundTransitionLayer"></div>
        <div class="bg-mask"></div>
    </div>

    <div class="app-container" id="mainContainer">
        <header class="apple-header">
            <h1>SOXL</h1>
            <div class="header-actions">
                <button id="themeToggleButton" class="icon-btn" title="切换深浅色">
                    <i class="fas fa-sun theme-icon theme-icon--sun"></i>
                    <i class="fas fa-moon theme-icon theme-icon--moon"></i>
                </button>
                <button id="openSettingsBtn" class="icon-btn" title="系统设置"><i class="fas fa-cog"></i></button>
            </div>
        </header>

        <section class="search-section" id="searchArea">
            <div class="search-bar-glass">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索你喜欢的音乐、歌手...">
                
                <div class="dropdown-wrapper" id="sourceSelectWrapper">
                    <button id="sourceSelectButton" class="dropdown-btn">
                        <span id="sourceSelectLabel">网易云</span>
                        <i class="fas fa-chevron-down caret-icon"></i>
                    </button>
                    <div id="sourceMenu" class="dropdown-menu"></div>
                </div>
                <button id="searchBtn" class="action-btn primary-btn">搜索</button>
            </div>
            
            <div id="searchResults" class="search-results"><div id="searchResultsList" class="search-results-list"></div></div>
        </section>

        <section class="playlist-section">
            <div class="playlist active empty" id="playlist" role="tabpanel">
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTab" class="playlist-tab active" data-target="playlist">播放队列</button>
                        <button id="favoritesTab" class="playlist-tab" data-target="favorites">我的收藏</button>
                    </div>
                    <div class="playlist-actions">
                        <input id="importPlaylistInput" type="file" accept="application/json" hidden />
                        <button class="icon-btn" id="importPlaylistBtn" title="导入配置"><i class="fas fa-folder-open"></i></button>
                        <button class="icon-btn" id="exportPlaylistBtn" title="导出配置"><i class="fas fa-share-square"></i></button>
                        <button class="icon-btn danger" id="clearPlaylistBtn" onclick="clearPlaylist()" title="清空"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items" id="playlistItems"></div></div>
            </div>

            <div class="playlist favorites empty" id="favorites" role="tabpanel" hidden>
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTabSecondary" class="playlist-tab active" data-target="playlist">播放队列</button>
                        <button id="favoritesTabSecondary" class="playlist-tab" data-target="favorites">我的收藏</button>
                    </div>
                    <div class="playlist-actions">
                        <button class="icon-btn" id="addAllFavoritesBtn"><i class="fas fa-plus-circle"></i></button>
                        <input id="importFavoritesInput" type="file" accept="application/json" hidden />
                        <button class="icon-btn" id="importFavoritesBtn"><i class="fas fa-folder-open"></i></button>
                        <button class="icon-btn" id="exportFavoritesBtn"><i class="fas fa-share-square"></i></button>
                        <button class="icon-btn danger" id="clearFavoritesBtn"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items" id="favoriteItems"></div></div>
            </div>
        </section>
    </div>

    <div class="lyric-screen hidden" id="lyricScreen">
        <button id="closeLyricBtn" class="lyric-close-btn" title="收起"><i class="fas fa-chevron-down"></i></button>
        <div class="lyric-screen-layout">
            <div class="lyric-left">
                <div class="album-cover" id="albumCover">
                    <div class="placeholder"><i class="fas fa-music"></i></div>
                </div>
            </div>
            <div class="lyric-right">
                <div class="lyrics empty" id="lyrics" data-placeholder="default">
                    <div class="lyrics-scroll" id="lyricsScroll">
                        <div class="lyrics-content" id="lyricsContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="apple-player-bar">
        <div class="bar-left" id="openLyricBtn" title="打开沉浸式播放器">
            <div class="cover-wrapper"><img id="barCoverImg" src="favicon.png" class="bar-cover" /></div>
            <div class="track-info">
                <div class="title-row">
                    <span id="currentSongTitle" class="song-title">未在播放</span>
                    <button class="favorite-toggle" id="currentFavoriteToggle"><i class="far fa-heart"></i></button>
                </div>
                <span id="currentSongArtist" class="song-artist">Apple Design</span>
            </div>
        </div>
        
        <div class="bar-center">
            <div class="transport-controls">
                <button id="playModeBtn" class="ctrl-btn"><i class="fas fa-repeat"></i></button>
                <button onclick="playPrevious()" class="ctrl-btn"><i class="fas fa-backward-step"></i></button>
                <button id="playPauseBtn" class="ctrl-btn play-btn"><i class="fas fa-play"></i></button>
                <button onclick="playNext()" class="ctrl-btn"><i class="fas fa-forward-step"></i></button>
                <button id="shuffleToggleBtn" class="ctrl-btn"><i class="fas fa-random"></i></button>
            </div>
            <div class="progress-bar-wrapper">
                <span id="currentTimeDisplay" class="time-text">00:00</span>
                <input type="range" id="progressBar" class="apple-slider" min="0" max="0" step="0.1" value="0">
                <span id="durationDisplay" class="time-text">00:00</span>
            </div>
        </div>

        <div class="bar-right">
            <div class="dropdown-wrapper quality-dropdown">
                <button id="qualityToggle" class="quality-btn"><span id="qualityLabel">极高</span></button>
                <div id="playerQualityMenu" class="dropdown-menu up-menu"></div>
            </div>
            <div class="volume-control">
                <i id="volumeIcon" class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" class="apple-slider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </footer>

    <audio id="audioPlayer" preload="metadata" playsinline></audio>
    <div id="settingsModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2>偏好设置</h2>
                <button id="closeSettingsBtn" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="radarGenreList" class="genre-grid"></div>
            </div>
            <div class="modal-footer"><button id="saveSettingsBtn" class="action-btn primary-btn">完成</button></div>
        </div>
    </div>
    <div id="notification" class="notification"></div>
    <div id="debugInfo" class="debug-info" style="display:none;"></div>

    <div style="display:none;">
        <button id="loadOnlineBtn"></button>
        <button id="mobileQueueToggle"></button>
        <button id="mobileSearchToggle"></button>
        <button id="mobileExploreButton"></button>
        <div id="mobileToolbarTitle"></div>
        <button id="mobileSearchClose"></button>
        <button id="mobilePanelClose"></button>
        <button id="mobileClearPlaylistBtn"></button>
        <div id="mobilePlaylistActions"></div>
        <div id="mobileFavoritesActions"></div>
        <button id="mobileAddAllFavoritesBtn"></button>
        <button id="mobileImportFavoritesBtn"></button>
        <button id="mobileExportFavoritesBtn"></button>
        <button id="mobileClearFavoritesBtn"></button>
        <div id="mobileOverlayScrim"></div>
        <button id="mobileQualityToggle"></button>
        <span id="mobileQualityLabel"></span>
        <div id="mobilePanel"></div>
        <button id="showPlaylistBtn"></button>
        <button id="showLyricsBtn"></button>
        <div id="mobileInlineLyrics"><div id="mobileInlineLyricsScroll"><div id="mobileInlineLyricsContent"></div></div></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/index.js"></script>
    
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- 1. 沉浸式歌词面板控制 ---
        const lyricScreen = document.getElementById("lyricScreen");
        document.getElementById("openLyricBtn").addEventListener("click", (e) => {
            if(e.target.closest('.favorite-toggle')) return; 
            lyricScreen.classList.remove("hidden");
        });
        document.getElementById("closeLyricBtn").addEventListener("click", () => {
            lyricScreen.classList.add("hidden");
        });

        // --- 2. 下拉框行为修复 (点击外部自动关闭) ---
        const toggleDropdown = (btnId, menuId) => {
            const btn = document.getElementById(btnId);
            const menu = document.getElementById(menuId);
            if(!btn || !menu) return;
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                document.querySelectorAll('.dropdown-menu').forEach(m => {
                    if(m !== menu) m.classList.remove('show');
                });
                menu.classList.toggle('show');
            });
        };
        toggleDropdown("sourceSelectButton", "sourceMenu");
        toggleDropdown("qualityToggle", "playerQualityMenu");
        
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.dropdown-wrapper')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('show'));
            }
        });

        // --- 3. 封面旋转动画同步 ---
        const albumCover = document.getElementById("albumCover");
        const barCoverImg = document.getElementById("barCoverImg");
        const audio = document.getElementById("audioPlayer");

        const observer = new MutationObserver(() => {
            const img = albumCover.querySelector("img");
            if (img && img.src) barCoverImg.src = img.src;
        });
        observer.observe(albumCover, { childList: true, subtree: true });

        const toggleSpin = () => {
            if(!audio.paused && !audio.ended && audio.src) {
                albumCover.classList.add("spinning");
                barCoverImg.classList.add("spinning");
            } else {
                albumCover.classList.remove("spinning");
                barCoverImg.classList.remove("spinning");
            }
        };
        audio.addEventListener("play", toggleSpin);
        audio.addEventListener("pause", toggleSpin);

        // --- 4. 【关键修复】逐行歌词自动跟随滚动 ---
        const lyricsContent = document.getElementById('lyricsContent');
        const lyricsScroll = document.getElementById('lyricsScroll');
        
        if (lyricsContent && lyricsScroll) {
            // 监听歌词容器内部 DOM class 的变化
            const lyricObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.attributeName === 'class') {
                        const target = mutation.target;
                        // 找到被加上高亮类的当前歌词行（原代码可能用 current 或 active）
                        if (target.classList.contains('current') || target.classList.contains('active')) {
                            // 核心：平滑滚动到屏幕中心
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'center'
                            });
                        }
                    }
                });
            });
            // 监听所有子元素（即每一行歌词）的属性变化
            lyricObserver.observe(lyricsContent, {
                attributes: true,
                subtree: true,
                attributeFilter: ['class']
            });
        }
    });
    </script>
</body>
</html>
