<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOXL Music Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
</head>
<body>
    <div class="app-container" id="mainContainer">
        <header class="apple-header glass-effect">
            <h1>SOXL Music Player</h1>
            <div class="header-actions">
                <button id="openPaletteBtn" class="icon-btn" title="个性化主题"><i class="fas fa-palette"></i></button>
                <button id="themeToggleButton" class="icon-btn" title="切换深浅色">
                    <i class="fas fa-sun theme-icon theme-icon--sun"></i>
                    <i class="fas fa-moon theme-icon theme-icon--moon"></i>
                </button>
                <button id="openSettingsBtn" class="icon-btn" title="偏好设置"><i class="fas fa-sliders-h"></i></button>
            </div>
        </header>

        <section class="search-section" id="searchArea">
            <div class="search-bar-glass">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索你喜欢的音乐、歌手、专辑...">
                
                <div class="dropdown-wrapper" id="sourceSelectWrapper">
                    <button id="sourceSelectButton" class="dropdown-btn">
                        <span id="sourceSelectLabel">网易云</span>
                        <i class="fas fa-chevron-down caret-icon"></i>
                    </button>
                    <div id="sourceMenu" class="dropdown-menu"></div>
                </div>
                <button id="searchBtn" class="action-btn primary-btn">搜 索</button>
            </div>
            
            <div id="searchResults" class="search-results"><div id="searchResultsList" class="search-results-list list-grid-layout"></div></div>
        </section>

        <section class="playlist-section glass-effect">
            <div class="playlist active empty" id="playlist" role="tabpanel">
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTab" class="playlist-tab active" data-target="playlist">播放队列</button>
                        <button id="favoritesTab" class="playlist-tab" data-target="favorites">我的收藏</button>
                    </div>
                    <div class="playlist-actions">
                        <input id="importPlaylistInput" type="file" accept="application/json" hidden />
                        <button class="icon-btn" id="importPlaylistBtn" title="导入"><i class="fas fa-file-import"></i></button>
                        <button class="icon-btn" id="exportPlaylistBtn" title="导出"><i class="fas fa-file-export"></i></button>
                        <button class="icon-btn danger" id="clearPlaylistBtn" onclick="clearPlaylist()" title="清空"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items list-grid-layout" id="playlistItems"></div></div>
            </div>

            <div class="playlist favorites empty" id="favorites" role="tabpanel" hidden>
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTabSecondary" class="playlist-tab active" data-target="playlist">播放队列</button>
                        <button id="favoritesTabSecondary" class="playlist-tab" data-target="favorites">我的收藏</button>
                    </div>
                    <div class="playlist-actions">
                        <button class="icon-btn" id="addAllFavoritesBtn"><i class="fas fa-plus-circle"></i></button>
                        <input id="importFavoritesInput" type="file" accept="application/json" hidden />
                        <button class="icon-btn" id="importFavoritesBtn" title="导入收藏"><i class="fas fa-file-import"></i></button>
                        <button class="icon-btn" id="exportFavoritesBtn" title="导出收藏"><i class="fas fa-file-export"></i></button>
                        <button class="icon-btn danger" id="clearFavoritesBtn" title="清空收藏"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items list-grid-layout" id="favoriteItems"></div></div>
            </div>
        </section>
    </div>

    <div class="lyric-screen hidden" id="lyricScreen">
        <div class="lyric-blur-bg" id="lyricBlurBg"></div> <button id="closeLyricBtn" class="lyric-close-btn" title="收起"><i class="fas fa-chevron-down"></i></button>
        
        <div class="lyric-screen-layout">
            <div class="lyric-left">
                <div class="lyric-big-cover">
                    <img id="bigCoverImg" src="favicon.png" alt="cover">
                </div>
            </div>
            <div class="lyric-right">
                <div class="lyrics empty" id="lyrics" data-placeholder="default">
                    <div class="lyrics-scroll" id="lyricsScroll">
                        <div class="lyrics-content" id="lyricsContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="apple-player-bar glass-effect">
        <div class="bar-left" id="openLyricBtn" title="打开歌词面板">
            <div class="cover-wrapper"><img id="barCoverImg" src="favicon.png" class="bar-cover" /></div>
            <div class="track-info">
                <div class="title-row">
                    <span id="currentSongTitle" class="song-title">未在播放</span>
                    <button class="favorite-toggle" id="currentFavoriteToggle"><i class="far fa-heart"></i></button>
                </div>
                <span id="currentSongArtist" class="song-artist">SOXL Music</span>
            </div>
        </div>
        
        <div class="bar-center">
            <div class="transport-controls">
                <button id="playModeBtn" class="ctrl-btn"><i class="fas fa-repeat"></i></button>
                <button onclick="playPrevious()" class="ctrl-btn"><i class="fas fa-backward-step"></i></button>
                <button id="playPauseBtn" class="ctrl-btn play-btn"><i class="fas fa-play"></i></button>
                <button onclick="playNext()" class="ctrl-btn"><i class="fas fa-forward-step"></i></button>
                <button id="shuffleToggleBtn" class="ctrl-btn"><i class="fas fa-random"></i></button>
            </div>
            <div class="progress-bar-wrapper">
                <span id="currentTimeDisplay" class="time-text">00:00</span>
                <input type="range" id="progressBar" class="apple-slider" min="0" max="0" step="0.1" value="0">
                <span id="durationDisplay" class="time-text">00:00</span>
            </div>
        </div>

        <div class="bar-right">
            <button class="icon-btn radar-btn" title="音乐雷达"><i class="fas fa-broadcast-tower"></i></button>
            
            <div class="dropdown-wrapper quality-dropdown">
                <button id="qualityToggle" class="quality-btn"><span id="qualityLabel">极高</span> <i class="fas fa-angle-up"></i></button>
                <div id="playerQualityMenu" class="dropdown-menu up-menu"></div>
            </div>
            
            <div class="volume-control">
                <i id="volumeIcon" class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" class="apple-slider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </footer>

    <div id="settingsModal" class="modal-overlay glass-overlay" aria-hidden="true">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h2>偏好设置</h2>
                <button id="closeSettingsBtn" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <h3 class="setting-title">雷达推荐风格</h3>
                <div id="radarGenreList" class="genre-grid block-layout"></div>
            </div>
            <div class="modal-footer"><button id="saveSettingsBtn" class="action-btn primary-btn">保存设置</button></div>
        </div>
    </div>

    <div id="paletteModal" class="modal-overlay glass-overlay" aria-hidden="true">
        <div class="modal-content glass-effect palette-content">
            <div class="modal-header">
                <h2>主题配色 (莫兰迪)</h2>
                <button id="closePaletteBtn" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body theme-grid">
                <div class="theme-color-item active" style="--t-color: #007AFF;" data-color="#007AFF" title="iOS 蓝"></div>
                <div class="theme-color-item" style="--t-color: #8C9C90;" data-color="#8C9C90" title="鼠尾草绿"></div>
                <div class="theme-color-item" style="--t-color: #C1A5A9;" data-color="#C1A5A9" title="灰玫瑰"></div>
                <div class="theme-color-item" style="--t-color: #929FA8;" data-color="#929FA8" title="烟雨灰"></div>
                <div class="theme-color-item" style="--t-color: #B4A9C0;" data-color="#B4A9C0" title="丁香紫"></div>
                <div class="theme-color-item" style="--t-color: #D1BFAe;" data-color="#D1BFAe" title="麦田卡其"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata" playsinline></audio>
    <div id="notification" class="notification glass-effect"></div>
    <div id="debugInfo" class="debug-info" style="display:none;"></div>
    <div style="display:none;" id="albumCover"></div>
    <div style="display:none;">
        <button id="loadOnlineBtn"></button>
        <button id="mobileQueueToggle"></button>
        <button id="mobileSearchToggle"></button>
        <button id="mobileExploreButton"></button>
        <div id="mobileToolbarTitle"></div>
        <button id="mobileSearchClose"></button>
        <button id="mobilePanelClose"></button>
        <button id="mobileClearPlaylistBtn"></button>
        <div id="mobilePlaylistActions"></div>
        <div id="mobileFavoritesActions"></div>
        <button id="mobileAddAllFavoritesBtn"></button>
        <button id="mobileImportFavoritesBtn"></button>
        <button id="mobileExportFavoritesBtn"></button>
        <button id="mobileClearFavoritesBtn"></button>
        <div id="mobileOverlayScrim"></div>
        <button id="mobileQualityToggle"></button>
        <span id="mobileQualityLabel"></span>
        <div id="mobilePanel"></div>
        <button id="showPlaylistBtn"></button>
        <button id="showLyricsBtn"></button>
        <div id="mobileInlineLyrics"><div id="mobileInlineLyricsScroll"><div id="mobileInlineLyricsContent"></div></div></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/index.js"></script>
    
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- 1. 莫兰迪主题配色系统 ---
        const root = document.documentElement;
        const paletteModal = document.getElementById('paletteModal');
        const colorItems = document.querySelectorAll('.theme-color-item');
        
        document.getElementById('openPaletteBtn').addEventListener('click', () => {
            paletteModal.removeAttribute('aria-hidden');
        });
        document.getElementById('closePaletteBtn').addEventListener('click', () => {
            paletteModal.setAttribute('aria-hidden', 'true');
        });

        // 读取本地存储的主题色
        const savedColor = localStorage.getItem('soxl-custom-color') || '#007AFF';
        root.style.setProperty('--primary-color', savedColor);
        colorItems.forEach(item => {
            if(item.dataset.color === savedColor) item.classList.add('active');
            else item.classList.remove('active');
            
            item.addEventListener('click', (e) => {
                const color = e.target.dataset.color;
                root.style.setProperty('--primary-color', color);
                localStorage.setItem('soxl-custom-color', color);
                colorItems.forEach(i => i.classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        // --- 2. 沉浸式歌词面板控制 (解决透视与拦截问题) ---
        const lyricScreen = document.getElementById("lyricScreen");
        const lyricBlurBg = document.getElementById("lyricBlurBg");
        
        document.getElementById("openLyricBtn").addEventListener("click", (e) => {
            if(e.target.closest('.favorite-toggle')) return; 
            lyricScreen.classList.remove("hidden");
            document.body.style.overflow = 'hidden'; // 防止背部滚动
            // 提取小封面的图作为大背景进行虚化
            lyricBlurBg.style.backgroundImage = `url(${document.getElementById('barCoverImg').src})`;
        });
        document.getElementById("closeLyricBtn").addEventListener("click", () => {
            lyricScreen.classList.add("hidden");
            document.body.style.overflow = '';
        });

        // --- 3. 封面图同步分离 (大图静态，小图转动) ---
        const barCoverImg = document.getElementById("barCoverImg");
        const bigCoverImg = document.getElementById("bigCoverImg");
        const audio = document.getElementById("audioPlayer");

        // 监听封面变化并同步给大封面和小封面
        const observer = new MutationObserver(() => {
            const hiddenImg = document.querySelector("#albumCover img");
            if (hiddenImg && hiddenImg.src) {
                barCoverImg.src = hiddenImg.src;
                bigCoverImg.src = hiddenImg.src;
                lyricBlurBg.style.backgroundImage = `url(${hiddenImg.src})`;
            }
        });
        const hiddenCoverContainer = document.getElementById("albumCover");
        if(hiddenCoverContainer) observer.observe(hiddenCoverContainer, { childList: true, subtree: true });

        // 仅让底部小封面旋转
        const toggleSpin = () => {
            if(!audio.paused && !audio.ended && audio.src) {
                barCoverImg.classList.add("spinning");
            } else {
                barCoverImg.classList.remove("spinning");
            }
        };
        audio.addEventListener("play", toggleSpin);
        audio.addEventListener("pause", toggleSpin);

        // --- 4. 【关键修复】逐行歌词绝对居中滚动算法 ---
        const lyricsContent = document.getElementById('lyricsContent');
        const lyricsScroll = document.getElementById('lyricsScroll');
        
        if (lyricsContent && lyricsScroll) {
            const scrollLyric = () => {
                const activeLine = lyricsContent.querySelector('.current') || lyricsContent.querySelector('.active');
                if (activeLine) {
                    // 精确计算：将 activeLine 滚动到 scroll container 的垂直中心
                    const scrollContainerHeight = lyricsScroll.clientHeight;
                    const activeLineOffsetTop = activeLine.offsetTop;
                    const activeLineHeight = activeLine.clientHeight;
                    const targetScrollTop = activeLineOffsetTop - (scrollContainerHeight / 2) + (activeLineHeight / 2);
                    
                    lyricsScroll.scrollTo({
                        top: targetScrollTop,
                        behavior: 'smooth'
                    });
                }
            };

            // 使用 MutationObserver 监听 class 的跳动
            const lyricObserver = new MutationObserver(() => { scrollLyric(); });
            lyricObserver.observe(lyricsContent, { attributes: true, subtree: true, attributeFilter: ['class'] });
            
            // 兜底：每秒校准一次滚动位置
            setInterval(scrollLyric, 1000);
        }

        // --- 5. 下拉菜单绝对防遮挡控制 ---
        const setupDropdown = (btnId, menuId) => {
            const btn = document.getElementById(btnId);
            const menu = document.getElementById(menuId);
            if(!btn || !menu) return;
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                document.querySelectorAll('.dropdown-menu').forEach(m => {
                    if(m !== menu) m.classList.remove('show');
                });
                menu.classList.toggle('show');
            });
        };
        setupDropdown("sourceSelectButton", "sourceMenu");
        setupDropdown("qualityToggle", "playerQualityMenu");
        
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('show'));
        });
    });
    </script>
</body>
</html>
