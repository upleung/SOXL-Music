<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOXL-Music</title>
    <meta name="apple-mobile-web-app-title" content="SOXL-Music">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
</head>
<body>
    <div class="background-stage" id="backgroundStage" aria-hidden="true">
        <div class="background-stage__layer background-stage__layer--base" id="backgroundBaseLayer"></div>
        <div class="background-stage__layer background-stage__layer--transition" id="backgroundTransitionLayer"></div>
        <div class="bg-mask"></div>
    </div>

    <div class="container main-view" id="mainContainer">
        <div class="header alger-header">
            <h1>SOXL-Music</h1>
            <div class="header-left-controls">
                <button id="themeToggleButton" class="theme-toggle-button" type="button"><i class="fas fa-sun theme-icon theme-icon--sun"></i><i class="fas fa-moon theme-icon theme-icon--moon"></i></button>
            </div>
            <div class="theme-switch-wrapper">
                <button id="openSettingsBtn" class="theme-toggle-button" type="button"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="search-area" id="searchArea">
            <div class="search-controls-wrapper">
                <div class="search-bar-unified">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="搜索歌曲、歌手或专辑...">
                    </div>
                    <div class="source-select-wrapper" id="sourceSelectWrapper">
                        <button id="sourceSelectButton" class="source-select-btn"><span id="sourceSelectLabel">网易云</span><i class="fas fa-chevron-down caret-icon"></i></button>
                        <div id="sourceMenu" class="source-menu"></div>
                    </div>
                </div>
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
                <div class="search-results-toolbar">
                    <div class="import-dropdown">
                        <button class="import-selected-btn" id="importSelectedBtn" disabled><i class="fas fa-file-import"></i> <span id="importSelectedCount"></span></button>
                        <div class="import-dropdown-menu" id="importSelectedMenu" hidden>
                            <button class="import-dropdown-item" id="importToPlaylist">导入到播放列表</button>
                            <button class="import-dropdown-item" id="importToFavorites">导入到收藏列表</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="searchResults" class="search-results"><div id="searchResultsList" class="search-results-list"></div></div>
        </div>

        <div class="main-content">
            <div class="playlist active empty" id="playlist" role="tabpanel">
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTab" class="playlist-tab active" data-target="playlist">播放列表</button>
                        <button id="favoritesTab" class="playlist-tab" data-target="favorites">收藏列表</button>
                    </div>
                    <div class="playlist-actions-tray">
                        <input id="importPlaylistInput" type="file" accept="application/json" hidden />
                        <button class="playlist-action-btn" id="importPlaylistBtn"><i class="fas fa-file-import"></i></button>
                        <button class="playlist-action-btn" id="exportPlaylistBtn"><i class="fas fa-file-export"></i></button>
                        <button class="playlist-action-btn" id="clearPlaylistBtn" onclick="clearPlaylist()"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items" id="playlistItems"></div></div>
            </div>

            <div class="playlist favorites empty" id="favorites" role="tabpanel" hidden>
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button id="playlistTabSecondary" class="playlist-tab active" data-target="playlist">播放列表</button>
                        <button id="favoritesTabSecondary" class="playlist-tab" data-target="favorites">收藏列表</button>
                    </div>
                    <div class="playlist-actions-tray">
                        <button class="playlist-action-btn" id="addAllFavoritesBtn"><i class="fas fa-plus-circle"></i></button>
                        <input id="importFavoritesInput" type="file" accept="application/json" hidden />
                        <button class="playlist-action-btn" id="importFavoritesBtn"><i class="fas fa-file-import"></i></button>
                        <button class="playlist-action-btn" id="exportFavoritesBtn"><i class="fas fa-file-export"></i></button>
                        <button class="playlist-action-btn" id="clearFavoritesBtn"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll"><div class="playlist-items" id="favoriteItems"></div></div>
            </div>
        </div>
    </div>

    <div class="lyric-screen hidden" id="lyricScreen">
        <button id="closeLyricBtn" class="lyric-close-btn"><i class="fas fa-chevron-down"></i></button>
        <div class="lyric-screen-layout">
            <div class="lyric-left">
                <div class="album-cover" id="albumCover">
                    <div class="placeholder"><i class="fas fa-music"></i></div>
                </div>
            </div>
            <div class="lyric-right">
                <div class="lyrics empty" id="lyrics" data-placeholder="default">
                    <div class="lyrics-scroll" id="lyricsScroll">
                        <div class="lyrics-content" id="lyricsContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="player-bar-left" id="openLyricBtn" title="展开歌词界面">
            <div class="bar-cover-wrapper">
                <img id="barCoverImg" src="favicon.png" class="bar-cover" />
            </div>
            <div class="bar-info">
                <div class="bar-title-row">
                    <span id="currentSongTitle" class="bar-title">选择歌曲</span>
                    <button class="favorite-toggle" id="currentFavoriteToggle"><i class="far fa-heart"></i></button>
                </div>
                <span id="currentSongArtist" class="bar-artist">未知艺术家</span>
            </div>
        </div>
        
        <div class="player-bar-center">
            <div class="transport-controls">
                <button id="playModeBtn" class="ctrl-btn"><i class="fas fa-repeat"></i></button>
                <button onclick="playPrevious()" class="ctrl-btn"><i class="fas fa-backward-step"></i></button>
                <button id="playPauseBtn" class="ctrl-btn play-btn"><i class="fas fa-play"></i></button>
                <button onclick="playNext()" class="ctrl-btn"><i class="fas fa-forward-step"></i></button>
                <button id="shuffleToggleBtn" class="ctrl-btn"><i class="fas fa-shuffle"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTimeDisplay">00:00</span>
                <input type="range" id="progressBar" min="0" max="0" step="0.1" value="0">
                <span id="durationDisplay">00:00</span>
            </div>
        </div>

        <div class="player-bar-right">
            <div class="player-quality">
                <button id="qualityToggle" class="quality-btn"><span id="qualityLabel">极高音质</span></button>
                <div id="playerQualityMenu" class="player-quality-menu"></div>
            </div>
            <div class="volume-container">
                <i id="volumeIcon" class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata" playsinline></audio>
    <div id="settingsModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content settings-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button id="closeSettingsBtn" class="close-modal-btn" aria-label="关闭设置"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <section class="settings-section">
                    <h3>探索雷达风格</h3>
                    <p class="settings-hint">选择您喜欢的音乐风格，探索雷达将从中为您推荐歌曲。</p>
                    <div id="radarGenreList" class="genre-grid"></div>
                </section>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="save-settings-btn">保存设置</button>
            </div>
        </div>
    </div>
    <div id="notification" class="notification"></div>
    <div id="debugInfo" class="debug-info"></div>

    <div style="display:none;">
        <button id="loadOnlineBtn"><span class="btn-text"></span><span class="loader"></span></button>
        <button id="mobileQueueToggle"></button>
        <button id="mobileSearchToggle"></button>
        <button id="mobileExploreButton"></button>
        <div id="mobileToolbarTitle"></div>
        <button id="mobileSearchClose"></button>
        <button id="mobilePanelClose"></button>
        <button id="mobileClearPlaylistBtn"></button>
        <div id="mobilePlaylistActions"></div>
        <div id="mobileFavoritesActions"></div>
        <button id="mobileAddAllFavoritesBtn"></button>
        <button id="mobileImportFavoritesBtn"></button>
        <button id="mobileExportFavoritesBtn"></button>
        <button id="mobileClearFavoritesBtn"></button>
        <div id="mobileOverlayScrim"></div>
        <button id="mobileQualityToggle"></button>
        <span id="mobileQualityLabel"></span>
        <div id="mobilePanel"></div>
        <button id="showPlaylistBtn"></button>
        <button id="showLyricsBtn"></button>
        <div id="mobileInlineLyrics"><div id="mobileInlineLyricsScroll"><div id="mobileInlineLyricsContent"></div></div></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/index.js"></script>
    
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const lyricScreen = document.getElementById("lyricScreen");
        const openBtn = document.getElementById("openLyricBtn");
        const closeBtn = document.getElementById("closeLyricBtn");
        const albumCover = document.getElementById("albumCover");
        const barCoverImg = document.getElementById("barCoverImg");
        const audio = document.getElementById("audioPlayer");

        // 1. 展开/收起沉浸式歌词面板
        openBtn.addEventListener("click", (e) => {
            if(e.target.closest('.favorite-toggle')) return; 
            lyricScreen.classList.remove("hidden");
            document.body.style.overflow = "hidden";
        });
        closeBtn.addEventListener("click", () => {
            lyricScreen.classList.add("hidden");
            document.body.style.overflow = "";
        });

        // 2. 封面同步与旋转动画逻辑
        const observer = new MutationObserver(() => {
            const img = albumCover.querySelector("img");
            if (img && img.src) barCoverImg.src = img.src;
        });
        observer.observe(albumCover, { childList: true, subtree: true });

        const toggleSpin = () => {
            if(!audio.paused && !audio.ended && audio.src) {
                albumCover.classList.add("spinning");
                barCoverImg.classList.add("spinning");
            } else {
                albumCover.classList.remove("spinning");
                barCoverImg.classList.remove("spinning");
            }
        };
        audio.addEventListener("play", toggleSpin);
        audio.addEventListener("pause", toggleSpin);
        audio.addEventListener("timeupdate", toggleSpin); // 强制校验
    });
    </script>
</body>
</html>
