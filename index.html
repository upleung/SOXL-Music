<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOXL Music Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container" id="mainContainer">
        <header class="apple-header glass-effect">
            <h1>SOXL Music</h1>
            <div class="header-actions">
                <button id="openPaletteBtn" class="icon-btn" title="个性化主题"><i class="fas fa-palette"></i></button>
                <button id="customThemeToggleBtn" class="icon-btn" title="切换深浅色">
                    <i class="fas fa-sun theme-icon theme-icon--sun"></i>
                    <i class="fas fa-moon theme-icon theme-icon--moon"></i>
                </button>
            </div>
        </header>

        <section class="search-section" id="searchArea">
            <div class="search-bar-glass">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索你喜欢的音乐、歌手、专辑...">
                
                <button id="clearSearchBtn" class="icon-btn clear-search-btn" style="display: none;"><i class="fas fa-times-circle"></i></button>

                <div class="dropdown-wrapper" id="sourceSelectWrapper">
                    <button id="sourceSelectButton" class="dropdown-btn">
                        <span id="sourceSelectLabel">网易云</span>
                        <i class="fas fa-chevron-down caret-icon"></i>
                    </button>
                    <div id="sourceMenu" class="dropdown-menu">
                        <div data-val="netease">网易云音乐</div>
                        <div data-val="kuwo">酷我音乐</div>
                        <div data-val="joox">JOOX音乐</div>
                        <div data-val="bilibili">哔哩哔哩</div>
                    </div>
                </div>
                <button id="searchBtn" class="action-btn primary-btn">搜 索</button>
            </div>
            
            <div id="searchResults" class="search-results" style="display: none;">
                <div class="section-title">搜索结果</div>
                <div id="searchResultsList" class="search-results-list list-grid-layout"></div>
            </div>
        </section>

        <section class="playlist-section glass-effect" id="playlistSectionWrapper">
            <div class="playlist active" id="playlist">
                <div class="playlist-header">
                    <div class="playlist-tabs">
                        <button class="playlist-tab active">播放队列</button>
                    </div>
                    <div class="playlist-actions">
                        <button class="icon-btn" id="importPlaylistBtn" title="导入歌单"><i class="fas fa-arrow-down-to-bracket"></i></button>
                        <button class="icon-btn" id="exportPlaylistBtn" title="导出歌单"><i class="fas fa-arrow-up-from-bracket"></i></button>
                        <button class="icon-btn danger" id="clearPlaylistBtn" title="清空"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="playlist-scroll">
                    <div class="playlist-items list-grid-layout" id="playlistItems"></div>
                </div>
            </div>
        </section>
    </div>

    <div class="lyric-screen hidden" id="lyricScreen">
        <div class="lyric-blur-bg" id="lyricBlurBg"></div>
        <button id="closeLyricBtn" class="lyric-close-btn" title="收起"><i class="fas fa-chevron-down"></i></button>
        <div class="lyric-screen-layout">
            <div class="lyric-left">
                <div class="lyric-big-cover"><img id="bigCoverImg" src="favicon.png" alt="cover"></div>
            </div>
            <div class="lyric-right">
                <div class="lyrics" id="lyrics">
                    <div class="lyrics-scroll" id="lyricsScroll">
                        <div class="lyrics-content" id="lyricsContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="apple-player-bar glass-effect">
        <div class="bar-left" id="openLyricBtn" title="打开歌词">
            <div class="cover-wrapper"><img id="barCoverImg" src="favicon.png" class="bar-cover" /></div>
            <div class="track-info">
                <div class="title-row">
                    <span id="currentSongTitle" class="song-title">未在播放</span>
                </div>
                <span id="currentSongArtist" class="song-artist">SOXL Music</span>
            </div>
        </div>
        
        <div class="bar-center">
            <div class="transport-controls">
                <button id="playModeBtn" class="ctrl-btn" title="列表循环"><i class="fas fa-repeat"></i></button>
                <button id="prevBtn" class="ctrl-btn"><i class="fas fa-backward-step"></i></button>
                <button id="playPauseBtn" class="ctrl-btn play-btn"><i class="fas fa-play"></i></button>
                <button id="nextBtn" class="ctrl-btn"><i class="fas fa-forward-step"></i></button>
                <button id="shuffleToggleBtn" class="ctrl-btn" title="随机播放"><i class="fas fa-shuffle"></i></button>
            </div>
            <div class="progress-bar-wrapper">
                <span id="currentTimeDisplay" class="time-text">00:00</span>
                <input type="range" id="progressBar" class="apple-slider" min="0" max="100" step="0.1" value="0">
                <span id="durationDisplay" class="time-text">00:00</span>
            </div>
        </div>

        <div class="bar-right">
            <button id="radarBtn" class="icon-btn radar-btn" title="音乐雷达"><i class="fas fa-satellite-dish"></i></button>
            
            <div class="dropdown-wrapper quality-dropdown">
                <button id="qualityToggle" class="quality-btn"><span id="qualityLabel">极高音质</span> <i class="fas fa-angle-up"></i></button>
                <div id="playerQualityMenu" class="dropdown-menu up-menu">
                    <div data-val="128">标准音质</div>
                    <div data-val="192">高品音质</div>
                    <div data-val="320">极高音质</div>
                    <div data-val="999">无损音质</div>
                </div>
            </div>
            
            <div class="volume-control">
                <i id="volumeIcon" class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" class="apple-slider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </footer>

    <div id="paletteModal" class="modal-overlay glass-overlay" aria-hidden="true">
        <div class="modal-content glass-effect palette-content">
            <div class="modal-header">
                <h2>莫兰迪主题配色</h2>
                <button id="closePaletteBtn" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body theme-grid">
                <div class="theme-color-item" style="--t-color: #007AFF;" data-color="#007AFF" title="iOS 蓝"></div>
                <div class="theme-color-item" style="--t-color: #34C759;" data-color="#34C759" title="薄荷绿"></div>
                <div class="theme-color-item" style="--t-color: #FF2D55;" data-color="#FF2D55" title="树莓红"></div>
                <div class="theme-color-item" style="--t-color: #AF52DE;" data-color="#AF52DE" title="丁香紫"></div>
                <div class="theme-color-item" style="--t-color: #FF9500;" data-color="#FF9500" title="琥珀橙"></div>
                <div class="theme-color-item" style="--t-color: #8E8E93;" data-color="#8E8E93" title="烟雨灰"></div>
            </div>
        </div>
    </div>

    <div id="notification" style="display:none !important;"></div>
    <audio id="audioPlayer" preload="metadata" playsinline></audio>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/index.js"></script>
    <script src="js/ui-controller.js"></script>
</body>
</html>
